  // Enhanced session management
  rpc ListUserSessions(ListUserSessionsRequest) returns (ListUserSessionsResponse) {
    option (google.api.http) = {
      post: "/api/ListUserSessions";
      body: "*";
    };
  }
  rpc BulkDeleteSessions(BulkDeleteSessionsRequest) returns (BulkDeleteSessionsResponse) {
    option (google.api.http) = {
      post: "/api/BulkDeleteSessions";
      body: "*";
    };
  }
  rpc GetSessionStats(GetSessionStatsRequest) returns (GetSessionStatsResponse) {
    option (google.api.http) = {
      post: "/api/GetSessionStats";
      body: "*";
    };
  }
  rpc RefreshSessionToken(RefreshSessionTokenRequest) returns (RefreshSessionTokenResponse) {
    option (google.api.http) = {
      post: "/api/RefreshSessionToken";
      body: "*";
    };
  }
  rpc InvalidateSession(InvalidateSessionRequest) returns (InvalidateSessionResponse) {
    option (google.api.http) = {
      post: "/api/InvalidateSession";
      body: "*";
    };
  }

  // API key management
  rpc CreateApiKey(CreateApiKeyRequest) returns (ApiKey) {
    option (google.api.http) = {
      post: "/api/CreateApiKey";
      body: "*";
    };
  }
  rpc ListApiKeys(ListApiKeysRequest) returns (ListApiKeysResponse) {
    option (google.api.http) = {
      post: "/api/ListApiKeys";
      body: "*";
    };
  }
  rpc RevokeApiKey(RevokeApiKeyRequest) returns (RevokeApiKeyResponse) {
    option (google.api.http) = {
      post: "/api/RevokeApiKey";
      body: "*";
    };
