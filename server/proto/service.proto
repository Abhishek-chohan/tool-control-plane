// ======================
// Machine Service
// ======================
service MachinesService {
  // Machine management
  rpc RegisterMachine(RegisterMachineRequest) returns (Machine) {
    option (google.api.http) = {
      post: "/api/RegisterMachine";
      body: "*";
    };
  }
  rpc ListMachines(ListMachinesRequest) returns (ListMachinesResponse) {
    option (google.api.http) = {
      post: "/api/ListMachines";
      body: "*";
    };
  }
  rpc GetMachine(GetMachineRequest) returns (Machine) {
    option (google.api.http) = {
      post: "/api/GetMachine";
      body: "*";
    };
  }
  rpc UpdateMachinePing(UpdateMachinePingRequest) returns (Machine) {
    option (google.api.http) = {
      post: "/api/UpdateMachinePing";
      body: "*";
    };
  }
  rpc UnregisterMachine(UnregisterMachineRequest) returns (UnregisterMachineResponse) {
    option (google.api.http) = {
      post: "/api/UnregisterMachine";
      body: "*";
    };
  }
  // Drain a machine: finish in-flight work then unregister
  rpc DrainMachine(DrainMachineRequest) returns (DrainMachineResponse) {
    option (google.api.http) = {
      post: "/api/DrainMachine";
      body: "*";
    };
  }
}

// DrainMachineRequest initiates graceful drain of machine
message DrainMachineRequest {
  string session_id = 1;
  string machine_id = 2;
}
message DrainMachineResponse {
  bool drained = 1;
}

