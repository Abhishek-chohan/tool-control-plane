  string session_id = 1;
}

// ListMachinesResponse
message ListMachinesResponse {
  repeated Machine machines = 1;
}

// GetMachineRequest
message GetMachineRequest {
  string session_id = 1;
  string machine_id = 2;
}

// UpdateMachinePingRequest
message UpdateMachinePingRequest {
  string session_id = 1;
  string machine_id = 2;
}

// UnregisterMachineRequest
message UnregisterMachineRequest {
  string session_id = 1;
  string machine_id = 2;
}

// UnregisterMachineResponse
message UnregisterMachineResponse {
  bool success = 1;
}

// ExecuteToolRequest for tool execution
message ExecuteToolRequest {
  string session_id = 1;
  string tool_name = 2;
  string input = 3;  // JSON input as string
}

// ExecuteToolResponse
message ExecuteToolResponse {
  string request_id = 1;
  string status = 2;
  string result = 3;  // JSON result as string
  string result_type = 4;
  string error = 5;
}

// ExecuteToolChunk is an absolute-sequence stream event.
// Non-final chunks use retained chunk sequence numbers; the terminal chunk, if sent,
// uses the request's current next sequence number.
message ExecuteToolChunk {
  int32 seq = 1;             // sequential chunk index
  string request_id = 2;
  string chunk = 3;
  bool is_final = 4;
  string error = 5;
}

// CreateRequestRequest
message CreateRequestRequest {
  string session_id = 1;
  string tool_name = 2;
  string input = 3;  // JSON input as string
}

// GetRequestRequest
message GetRequestRequest {
  string session_id = 1;
  string request_id = 2;
}

// ListRequestsRequest
message ListRequestsRequest {
  string session_id = 1;
  string status = 2;
  string tool_name = 3;
  int32 limit = 4;
  int32 offset = 5;
}

// ListRequestsResponse
message ListRequestsResponse {
  repeated Request requests = 1;
}

// UpdateRequestRequest
message UpdateRequestRequest {
  string session_id = 1;
  string request_id = 2;
  string status = 3;
  string result = 4;
  string result_type = 5;
}

// ClaimRequestRequest
message ClaimRequestRequest {
  string session_id = 1;
  string request_id = 2;
  string machine_id = 3;
}

// CancelRequestRequest
message CancelRequestRequest {
  string session_id = 1;
  string request_id = 2;
}

// CancelRequestResponse
message CancelRequestResponse {
  bool success = 1;
}

// SubmitRequestResultRequest
message SubmitRequestResultRequest {
  string session_id = 1;
  string request_id = 2;
  string result = 3;
  string result_type = 4;
  map<string, string> meta = 5;
}

// SubmitRequestResultResponse
message SubmitRequestResultResponse {
  bool success = 1;
}

// AppendRequestChunksRequest
message AppendRequestChunksRequest {
  string session_id = 1;
  string request_id = 2;
  repeated string chunks = 3;
  string result_type = 4;
}

// AppendRequestChunksResponse
message AppendRequestChunksResponse {
  bool success = 1;
}

// GetRequestChunksRequest
message GetRequestChunksRequest {
  string session_id = 1;
  string request_id = 2;
}

// GetRequestChunksResponse describes the currently retained chunk window.
message GetRequestChunksResponse {
  repeated string chunks = 1;
  int32 start_seq = 2;  // absolute sequence number of chunks[0], or next_seq when empty
  int32 next_seq = 3;   // next absolute chunk sequence number; terminal marker uses this seq
}

// Health check
message HealthCheckRequest {
}

message HealthCheckResponse {
