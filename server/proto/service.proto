message RegisterMachineRequest {
  string session_id = 1;
  string machine_id = 2;
  string sdk_version = 3;
  string sdk_language = 4;
  repeated RegisterToolRequest tools = 5; // Re-uses RegisterToolRequest for embedded tool definitions
}

// ListMachinesRequest
