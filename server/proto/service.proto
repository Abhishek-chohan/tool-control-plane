  int32 next_page_token = 2;
  int32 total_count = 3;
}

// BulkDeleteSessionsRequest
message BulkDeleteSessionsRequest {
  string user_id = 1;
  repeated string session_ids = 2; // Specific sessions to delete
  string filter = 3; // Optional filter to delete matching sessions
}

// BulkDeleteSessionsResponse
message BulkDeleteSessionsResponse {
  int32 deleted_count = 1;
  repeated string failed_deletions = 2; // Session IDs that failed to delete
}

// GetSessionStatsRequest
message GetSessionStatsRequest {
  string user_id = 1;
}

// GetSessionStatsResponse
message GetSessionStatsResponse {
  int32 total_sessions = 1;
  int32 active_sessions = 2;
