}

// RefreshSessionTokenRequest
message RefreshSessionTokenRequest {
  string session_id = 1;
}

// RefreshSessionTokenResponse
message RefreshSessionTokenResponse {
  string new_token = 1;
  string expires_at = 2;
}

// InvalidateSessionRequest
message InvalidateSessionRequest {
  string session_id = 1;
  string reason = 2; // Optional reason for invalidation
}

// InvalidateSessionResponse
message InvalidateSessionResponse {
  bool success = 1;
}

// UpdateSessionRequest
message UpdateSessionRequest {
  string session_id = 1;
  string name = 2;
  string description = 3;
  string namespace = 4;  // Optional namespace for organization
}

// DeleteSessionRequest
message DeleteSessionRequest {
  string session_id = 1;
}

// DeleteSessionResponse
message DeleteSessionResponse {
  bool success = 1;
}

// CreateApiKeyRequest
