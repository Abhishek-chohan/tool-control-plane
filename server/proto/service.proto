// Tool definition
message Tool {
  string id = 1;
  string name = 2;
  string description = 3;
  string schema = 4;  // JSON schema as string
  map<string, string> config = 5;
  string created_at = 6;
  string last_ping_at = 7;
  string session_id = 8;
  string machine_id = 9;
  repeated string tags = 10;  // Optional tags for categorization
}

// Session definition
message Session {
  string id = 1;
  string name = 2;
  string description = 3;
  string created_at = 4;
  string created_by = 5;
  string api_key = 6;
  string namespace = 7;  // Optional namespace for organization
}

// API Key definition
message ApiKey {
  string id = 1;
  string name = 2;
  string key = 3;
  string session_id = 4;
  string created_at = 5;
  string created_by = 6;
  string revoked_at = 7;
}

// Machine definition
message Machine {
  string id = 1;
  string session_id = 2;
  string sdk_version = 3;
  string sdk_language = 4;
  string ip = 5;
  string created_at = 6;
  string last_ping_at = 7;
}

// Request definition
message Request {
  string id = 1;
  string session_id = 2;
  string tool_name = 3;
  string status = 4;
  string input = 5;  // JSON input as string
  string result = 6;  // JSON result as string
  string result_type = 7;
  string error = 8;
  string created_at = 9;
  string updated_at = 10;
  string executing_machine_id = 11;
  repeated string stream_results = 12;
}

// RegisterToolRequest
message RegisterToolRequest {
  string session_id = 1;
  string machine_id = 2;
  string name = 3;
  string description = 4;
  string schema = 5;  // JSON schema as string
  map<string, string> config = 6;
  repeated string tags = 7;  // Optional tags for categorization
}

// RegisterToolResponse
message RegisterToolResponse {
  Tool tool = 1;
}

// ListToolsRequest
message ListToolsRequest {
  string session_id = 1;
}

// ListToolsResponse
message ListToolsResponse {
  repeated Tool tools = 1;
}

// GetToolByIdRequest
message GetToolByIdRequest {
  string session_id = 1;
  string tool_id = 2;
}

// GetToolByNameRequest
message GetToolByNameRequest {
  string session_id = 1;
  string tool_name = 2;
}

// GetToolResponse
message GetToolResponse {
  Tool tool = 1;
}

// DeleteToolRequest
message DeleteToolRequest {
  string session_id = 1;
  string tool_id = 2;
}

// DeleteToolResponse
message DeleteToolResponse {
  bool success = 1;
}

// UpdateToolPingRequest
message UpdateToolPingRequest {
  string session_id = 1;
  string tool_id = 2;
}

// CreateSessionRequest
message CreateSessionRequest {
  string user_id = 1;
  string name = 2;
  string description = 3;
  string api_key = 4;
  // Optional client-specified session ID
  string session_id = 5;
  string namespace = 6;  // Optional namespace for organization
}

// CreateSessionResponse
message CreateSessionResponse {
  Session session = 1;
}

// GetSessionRequest
message GetSessionRequest {
  string session_id = 1;
}

// ListSessionsRequest
message ListSessionsRequest {
  string user_id = 1;
}

// ListSessionsResponse
message ListSessionsResponse {
  repeated Session sessions = 1;
}

// ListUserSessionsRequest
message ListUserSessionsRequest {
  string user_id = 1;
  int32 page_size = 2;
  int32 page_token = 3;
  string filter = 4; // Optional filter (e.g., by namespace or status)
}

// ListUserSessionsResponse
message ListUserSessionsResponse {
