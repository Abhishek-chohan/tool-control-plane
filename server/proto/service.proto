syntax = "proto3";

package api;
option go_package = "toolplane/proto"; // Adjusted go_package

import "google/api/annotations.proto";

// ======================
// Tool Service
// ======================
service ToolService {
  // Tool management
  rpc RegisterTool(RegisterToolRequest) returns (RegisterToolResponse) {
    option (google.api.http) = {
      post: "/api/RegisterTool";
      body: "*";
    };
  }
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse) {
    option (google.api.http) = {
      post: "/api/ListTools";
      body: "*";
    };
  }
  rpc GetToolById(GetToolByIdRequest) returns (GetToolResponse) {
    option (google.api.http) = {
      post: "/api/GetToolById";
      body: "*";
    };
  }
  rpc GetToolByName(GetToolByNameRequest) returns (GetToolResponse) {
    option (google.api.http) = {
      post: "/api/GetToolByName";
      body: "*";
    };
  }
  rpc DeleteTool(DeleteToolRequest) returns (DeleteToolResponse) {
    option (google.api.http) = {
      post: "/api/DeleteTool";
      body: "*";
    };
  }
  rpc UpdateToolPing(UpdateToolPingRequest) returns (Tool) {
    option (google.api.http) = {
      post: "/api/UpdateToolPing";
      body: "*";
    };
  }

  // Consumer execution entrypoints create request-backed work on the control plane.
  // Request state, claim, and result lifecycle ownership stays in RequestsService.
  rpc StreamExecuteTool(ExecuteToolRequest) returns (stream ExecuteToolChunk) {
    option (google.api.http) = {
      post: "/api/StreamExecuteTool";
      body: "*";
    };
  }
  // Resume a broken stream from the last acknowledged sequence number.
  // The server retains a bounded chunk window; if the requested sequence has
  // fallen out of that window, this RPC fails with OUT_OF_RANGE.
  rpc ResumeStream(ResumeStreamRequest) returns (stream ExecuteToolChunk) {
    option (google.api.http) = {
      post: "/api/ResumeStream";
      body: "*";
    };
  }

  rpc ExecuteTool(ExecuteToolRequest) returns (ExecuteToolResponse) {
    option (google.api.http) = {
      post: "/api/ExecuteTool";
      body: "*";
    };
  }

  // Health check (can be in any service or its own)
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse) {
    option (google.api.http) = {
      post: "/api/HealthCheck"; // Or use get: "/healthz"
      body: "*";
    };
  }
}

// ResumeStreamRequest resumes a chunk stream after the provided absolute sequence number.
message ResumeStreamRequest {
  string request_id = 1;
  int32 last_seq = 2;  // last absolute sequence number received by the client
}

// ======================
